<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinemax - Élmények, amik megmaradnak</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">

            <a class="navbar-brand" href="index.html">
                <i class="bi bi-film"></i> CINEMAX
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Főoldal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="movies.html">Filmek</a>
                    </li>

                    <!-- ÚJ: Bookings -->
                     <li class="nav-item" id="bookingsNav" style="display:none;">
                        <a class="nav-link" href="bookings.html">Foglalások</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Rólunk</a>
                    </li>
                    <li class="nav-item ms-3">
                        <a href="login.html" class="btn btn-outline-gold" id="loginBtn">
                            <i class="bi bi-person"></i> Bejelentkezés
                        </a>
                        <a href="profile.html" class="btn btn-gold" id="userBtn" style="display:none;">
                            <i class="bi bi-person-circle"></i> <span id="userName"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

            <h1 class="hero-title">CINEMAX</h1>
            <p class="hero-subtitle">Élmények, amik megmaradnak</p>
            <a href="movies.html" class="btn btn-gold btn-lg">
                Filmek megtekintése <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </section>

    <section class="py-5" style="background: #111827;">
        <div class="container">
            <h2 class="section-title text-center">Most a mozikban</h2>
            <div class="row g-4" id="featuredMovies"></div>
        </div>
    </section>

    <!-- Toast Container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <!-- Közös JavaScript -->
    <script src="js/common.js"></script>
    <!-- Oldal specifikus JavaScript -->
