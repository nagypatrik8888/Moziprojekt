<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinemax – A moziélmény kezdete</title>

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">

  <!-- Csak ez kell ehhez az oldalhoz -->
  <link rel="stylesheet" href="css/home.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="index.html" aria-label="Cinemax főoldal">
        <i class="bi bi-film brand__icon"></i>
        <span class="brand__text">CINEMAX</span>
      </a>

      <nav class="nav">
        <a class="nav__link nav__link--active" href="index.html">FŐOLDAL</a>
        <a class="nav__link" href="movies.html">FILMEK</a>
        <a class="nav__link" href="about.html">RÓLUNK</a>
      </nav>

      <a class="btn btn--outline btn--pill" href="login.html">
        <i class="bi bi-person"></i>
        Bejelentkezés
      </a>
    </div>
  </header>

  <!-- HERO -->
  <main class="hero">
    <div class="hero__overlay"></div>

    <div class="hero__content">
      <!-- ITT VAN A CSERE: logó a szöveg helyén -->
      <div class="hero-logo">
        <div class="hero-logo__icon" aria-hidden="true">
          <i class="bi bi-camera-reels"></i>
        </div>

        <h1 class="hero-logo__text" aria-label="Cinemax">
          <span class="hero-logo__cinema">CINEMA</span><span class="hero-logo__max">X</span>
        </h1>

        <p class="hero-logo__tagline">ÉLMÉNYEK, AMIK MEGMARADNAK</p>
      </div>

      <!-- GOMBOK MARADNAK -->
      <div class="hero__buttons">
        <a class="btn btn--primary btn--big btn--pill" href="movies.html">
          <i class="bi bi-ticket-perforated"></i>
          FILMEK &amp; JEGYVÁSÁRLÁS
        </a>

        <a class="btn btn--outline btn--big btn--pill" href="about.html">
          <i class="bi bi-info-circle"></i>
          Mi ez a Cinemax?
        </a>
      </div>
    </div>

    <!-- STAT KÁRTYÁK (mint nálad alul) -->
    <section class="stats" aria-label="Statisztikák">
      <div class="stats__inner">
        <div class="stat">
          <div class="stat__value">15+</div>
          <div class="stat__label">év moziélmény</div>
        </div>

        <div class="stat">
          <div class="stat__value">1 000 000+</div>
          <div class="stat__label">néző</div>
        </div>

        <div class="stat">
          <div class="stat__value">5</div>
          <div class="stat__label">modern terem</div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
