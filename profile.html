<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilom - Cinemax</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.1/font/bootstrap-icons.min.css">
    <!-- Közös CSS -->
    <link rel="stylesheet" href="css/common.css">
    <!-- Profile CSS -->
    <link rel="stylesheet" href="css/profile.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-film"></i> CINEMAX
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Főoldal</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="movies.html">Filmek</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">Rólunk</a>
                    </li>
                    <li class="nav-item ms-3">
                        <a href="profile.html" class="btn btn-gold">
                            <i class="bi bi-person-circle"></i> <span id="userName"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile Container -->
    <div class="profile-container">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card bg-dark border-0 text-center p-4" style="backdrop-filter: blur(20px);">
                        <div class="card-body">
                            <div class="mb-4">
                                <i class="bi bi-person-circle profile-icon"></i>
                            </div>
                            <h2 class="section-title" id="profileName">-</h2>
                            <p class="text-muted mb-1" id="profileEmail">-</p>
                            <p class="text-muted mb-4" id="profilePhone">-</p>
                            
                            <div class="row g-3 mb-4">
                                <div class="col-6">
                                    <div class="stat-card">
                                        <div class="stat-number" id="totalBookings">0</div>
                                        <div>Foglalás</div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="stat-card">
                                        <div class="stat-number" id="totalPoints">0</div>
                                        <div>Pont</div>
                                    </div>
                                </div>
                            </div>
                            
                            <a href="bookings.html" class="btn btn-gold w-100 mb-2">
                                <i class="bi bi-list-ul"></i> Foglalásaim
                            </a>
                            <button class="btn btn-outline-danger w-100" onclick="logout()">
                                <i class="bi bi-box-arrow-right"></i> Kijelentkezés
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <!-- Közös JavaScript -->
    <script src="js/common.js"></script>
    <!-- Profile JavaScript -->
    <script src="js/profile.js"></script>
</body>
</html>
